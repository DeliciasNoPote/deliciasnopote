<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delícias no Pote</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      color: #d35400;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      transition: 0.2s;
    }

    .btn-whats {
      background: #25D366;
      color: white;
    }

    .btn-ifood {
      background: #ea1d2c;
      color: white;
    }

    .btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍮 Delícias no Pote</h1>
    <p>Bem-vindo! Clique abaixo para falar conosco ou pedir no iFood.</p>

    <a class="btn btn-whats" href="https://wa.me/55SEUNUMEROAQUI" target="_blank">
      📲 Falar no WhatsApp
    </a>

    <a class="btn btn-ifood" href="https://www.ifood.com.br" target="_blank">
      🍽️ Pedir no iFood
    </a>

    <footer>
      © 2026 - Delícias no Pote
    </footer>
  </div>
</body>
</html>
